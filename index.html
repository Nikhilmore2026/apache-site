<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Nikhil Server</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

/* Background */
body {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(270deg, #1e3c72, #2a5298, #6a11cb, #2575fc);
  background-size: 800% 800%;
  animation: gradientBG 12s ease infinite;
}

/* Background animation */
@keyframes gradientBG {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* Card */
.card {
  backdrop-filter: blur(20px);
  background: rgba(255, 255, 255, 0.1);
  padding: 50px;
  border-radius: 20px;
  text-align: center;
  color: white;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  animation: fadeIn 1.2s ease;
  transition: transform 0.3s;
}

/* Hover effect */
.card:hover {
  transform: scale(1.05);
}

/* Heading */
h1 {
  font-size: 42px;
  margin-bottom: 10px;
}

/* Typing animation */
.typing {
  font-size: 18px;
  border-right: 2px solid white;
  white-space: nowrap;
  overflow: hidden;
  width: 0;
  animation: typing 4s steps(30, end) infinite alternate,
             blink 0.7s infinite;
}

/* Typing effect */
@keyframes typing {
  from { width: 0 }
  to { width: 250px }
}

@keyframes blink {
  50% { border-color: transparent }
}

/* Button */
.btn {
  margin-top: 20px;
  padding: 12px 25px;
  border: none;
  border-radius: 25px;
  background: linear-gradient(45deg, #ff6a00, #ee0979);
  color: white;
  cursor: pointer;
  font-size: 16px;
  transition: 0.3s;
}

/* Button hover */
.btn:hover {
  transform: scale(1.1);
  box-shadow: 0 0 20px rgba(255,255,255,0.5);
}

/* Fade animation */
@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(30px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}
</style>

</head>

<body>

<div class="card">
  <h1>🚀 Nikhil Server</h1>
  <div class="typing">Apache + SSL + DevOps Ready</div>
  
  <button class="btn" onclick="showMessage()">Click Me</button>
</div>

<script>
function showMessage() {
  alert("🔥 Your Apache site is running perfectly!");
}
</script>

</body>
</html>
